services:
  - type: web
    name: smart-rag-chatbot
    env: docker
    region: oregon 
    plan: free
    branch: main
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      # Uncomment if using real Qdrant server
      # - key: QDRANT_URL
      #   sync: false
      # - key: QDRANT_API_KEY
      #   sync: false
      - key: PORT
        value: "8000"
    healthCheckPath: /
